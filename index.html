<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="" xml:lang="">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, user-scalable=no" />
	<title>MagicBallsAdventure</title>
	<style type="text/css">
		body {
			touch-action: none;
			margin: 0;
			border: 0 none;
			padding: 0;
			text-align: center;
			background-color: black;
		}

		#canvas {
			display: block;
			margin: 0;
			color: white;
		}

		#canvas:focus {
			outline: none;
		}

		.godot {
			font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
			color: #e0e0e0;
			background-color: #3b3943;
			background-image: linear-gradient(to bottom, #403e48, #35333c);
			border: 1px solid #45434e;
			box-shadow: 0 0 1px 1px #2f2d35;
		}

		/* Status bar */
		#status {
			position: absolute;
			left: 0;
			top: 0;
			right: 0;
			bottom: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			/* don't consume click events from the canvas */
			visibility: hidden;
		}

		#status-progress {
			width: 366px;
			height: 7px;
			background-color: #38363a;
			border: 1px solid #444246;
			padding: 1px;
			visibility: visible;
		}

		#status-progress-inner {
			height: 100%;
			width: 0;
			background-color: #202020;
			border: 1px solid #222222;
			box-shadow: 0 0 1px 1px #272727;
		}

		#status-indeterminate {
			height: 42px;
			visibility: visible;
			position: relative;
		}

		#status-indeterminate > div {
			width: 4.5px;
			height: 0;
			border-radius: 2px;
			background-color: #444444;
			position: absolute;
			bottom: 0;
			left: 0;
			animation: status-indeterminate-pulse 2s infinite ease-in-out;
		}

		#status-notice {
			margin: 0 100px;
			line-height: 1.3;
			visibility: visible;
			padding: 4px 6px;
			visibility: visible;
		}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	<!-- Braintree SDK -->
	<script src="https://js.braintreegateway.com/web/dropin/1.40.1/js/dropin.min.js"></script>
</head>
<body>
	<canvas id="canvas">
		HTML5 canvas app is not supported by your browser.
	</canvas>
	<div id="status">
		<div id="status-progress" style="display: none;" oncontextmenu="event.preventDefault();"><div id="status-progress-inner"></div></div>
		<div id="status-indeterminate" style="display: none;" oncontextmenu="event.preventDefault();">
			<div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
		</div>
		<div id="status-notice" class="godot" style="display: none;"></div>
	</div>

	<!-- Payment UI Container -->
	<div id="payment-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
		<div id="dropin-container" style="width:90%; max-width:500px; background:white; padding:20px; border-radius:8px;"></div>
		<button id="submit-button" style="display:none; margin-top:20px; padding:10px 20px;">Purchase</button>
		<button onclick="document.getElementById('payment-overlay').style.display='none'" style="margin-top:20px; margin-left:10px;">Cancel</button>
	</div>

	<script type="text/javascript">
		const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":652384,"index.wasm":35376909},"focusCanvas":true,"gdextensionLibs":[]};
		const engine = new Engine(GODOT_CONFIG);

		(function () {
			const statusProgress = document.getElementById('status-progress');
			const statusProgressInner = document.getElementById('status-progress-inner');
			const statusIndeterminate = document.getElementById('status-indeterminate');
			const statusNotice = document.getElementById('status-notice');

			let initializing = true;
			let statusMode = 'hidden';

			function setStatusMode(mode) {
				if (statusMode === mode || !initializing) {
					return;
				}
				[statusProgress, statusIndeterminate, statusNotice].forEach((elem) => {
					elem.style.display = 'none';
				});
				switch (mode) {
				case 'progress':
					statusProgress.style.display = 'block';
					break;
				case 'indeterminate':
					statusIndeterminate.style.display = 'block';
					break;
				case 'notice':
					statusNotice.style.display = 'block';
					break;
				case 'hidden':
					break;
				default:
					throw new Error('Invalid status mode');
				}
				statusMode = mode;
			}

			function setStatusNotice(text) {
				while (statusNotice.lastChild) {
					statusNotice.removeChild(statusNotice.lastChild);
				}
				const lines = text.split('\n');
				lines.forEach((line) => {
					statusNotice.appendChild(document.createTextNode(line));
					statusNotice.appendChild(document.createElement('br'));
				});
			}

			function displayFailureNotice(err) {
				const msg = err.message || err;
				console.error(msg);
				setStatusNotice(msg);
				setStatusMode('notice');
				initializing = false;
			}

			if (!Engine.isWebGLAvailable()) {
				displayFailureNotice('WebGL not available');
			} else {
				setStatusMode('indeterminate');
				engine.startGame({
					'onProgress': function (current, total) {
						if (total > 0) {
							statusProgressInner.style.width = `${(current / total) * 100}%`;
							setStatusMode('progress');
							if (current === total) {
								// Wait for main loop to make up the missing quarter-second before removing the splash.
								setTimeout(() => {
									setStatusMode('hidden');
								}, 500);
							}
						} else {
							setStatusMode('indeterminate');
						}
					},
				}).then(() => {
					setStatusMode('hidden');
					initializing = false;
				}, displayFailureNotice);
			}
		}());

		// --- Braintree / GPay Bridge ---
		let braintreeInstance = null;
		
		window.initBraintreeUI = function() {
			console.log("Braintree Bridge: Initialized.");
			// Pre-fetching client token would happen here from your bizum/gpay server
		};

		window.requestPayment = function(itemId, price) {
			console.log("Requesting payment for " + itemId + " at " + price);
			document.getElementById('payment-overlay').style.display = 'flex';
			
			// Replace 'YOUR_CLIENT_AUTHORIZATION' with actual token from your backend
			const clientToken = "sandbox_999999_sample_token"; 

			if (!braintreeInstance) {
				braintree.dropin.create({
					authorization: clientToken,
					container: '#dropin-container',
					googlePay: { merchantId: 'merchant-id-from-google' },
					applePay: { displayName: 'Magic Balls Adventure', paymentRequest: { total: { label: itemId, amount: price } } }
				}, function (createErr, instance) {
					if (createErr) {
						console.error('Create Error', createErr);
						return;
					}
					braintreeInstance = instance;
					document.getElementById('submit-button').style.display = 'block';
					document.getElementById('submit-button').onclick = function() {
						instance.requestPaymentMethod(function (err, payload) {
							if (err) {
								console.error('Request Payment Method Error', err);
								return;
							}
							// Send payload.nonce to your server
							console.log('Got nonce:', payload.nonce);
							// Mock Success:
							document.getElementById('payment-overlay').style.display = 'none';
							if (window.game_instance) {
								// Ensure you export the game instance to window in your PWA/HTML setup
								// window.game_instance.call("payment_complete", itemId);
							}
							// In Godot, you can also use JavaScriptBridge.get_interface("window").payment_complete(itemId)
							// If we use a global callback:
							if (window.godotPaymentCallback) window.godotPaymentCallback(itemId);
						});
					};
				});
			}
		};
	</script>
</body>
</html>
